---
layout: default
---
<article class="container post-page">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% for tag in page.tags %}{% include tag-pill.html tag=tag %}{% endfor %}
    </div>
  </header>

  <div class="prose">
    {{ content }}
  </div>

  <a class="post-nav-back" href="{{ '/' | relative_url }}">&larr; Back to all posts</a>
</article>
